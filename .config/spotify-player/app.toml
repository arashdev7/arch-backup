log_folder = "/home/Deboo/.cache/spotify-player"
theme = "wal"
client_id = "25042b2f871942d59025f0bd4c2013b8"
client_port = 8989
login_redirect_uri = "http://127.0.0.1:8989/login" 
playback_format = "{status} {track} • {artists}\n{album}\n{metadata}"
playback_metadata_fields = ["repeat", "shuffle", "volume", "device"]
notify_timeout_in_secs = 0
tracks_playback_limit = 50
app_refresh_duration_in_ms = 32
playback_refresh_duration_in_ms = 0
page_size_in_rows = 20
play_icon = "▶"
pause_icon = "▌▌"
liked_icon = "♥"
border_type = "Plain"
progress_bar_type = "Rectangle"
cover_img_length = 9
cover_img_width = 5
cover_img_scale = 1.0
enable_media_control = true
enable_streaming = true
enable_notify = true
enable_cover_image_cache = true
default_device = ""
notify_streaming_only = false
seek_duration_secs = 5
sort_artist_albums_by_type = false

[notify_format]
summary = "{track} • {artists}"
body = "{album}"

[layout]
playback_window_position = "Top"
playback_window_height = 6

[layout.library]
playlist_percent = 40
album_percent = 40

[device]
name = "deboo_arch"
device_type = "speaker"
volume = 80
bitrate = 320
audio_cache = true
normalization = false
# This is the line that fixes the skipping:
audio_backend = "rodio"

default_device = "deboo_arch"